<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Mission Bodhmay Bharat</title>

<style>

/* GLOBAL STYLES */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
line-height:1.6;
}

/* NAVBAR */
header{
background:#0d47a1;
color:white;
}

nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
color:white;
text-decoration:none;
}

.donate-btn{
background:#ff9800;
padding:8px 14px;
border-radius:5px;
}
.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
}


/* HERO */
.hero{
background:#0d47a1;
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

/* GALLERY SECTION */
.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery-item{
overflow:hidden;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition: transform 0.3s ease;
}

.gallery-item img{
width:100%;
height:auto;
display:block;
transition: transform 0.3s ease;
}

.gallery-item:hover img{
transform: scale(1.05);
}

/* FOOTER */
footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){

nav ul{
position:absolute;
top:60px;
left:0;
width:100%;
background:#0d47a1;
flex-direction:column;
display:none;
}

nav ul li{
margin:15px 0;
text-align:center;
}

nav ul.show{
display:flex;
}

.menu-toggle{
display:block;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">Bodhmay Bharat</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul id="menu">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="programs.html">Programs</a></li>
<li><a href="volunteer.html">Volunteer</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="donate.html" class="donate-btn">Donate</a></li>

</ul>

</nav>

</header>

<section class="hero">
<h1>Gallery</h1>
<p>Photos from our monks, events, and community programs.</p>
</section>

<div class="container">

<div class="gallery-grid">

<!-- Gallery Item 1 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Monk Training Session">
</div>

<!-- Gallery Item 2 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Community Awareness Program">
</div>

<!-- Gallery Item 3 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Buddhist Meditation">
</div>

<!-- Gallery Item 4 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Social Outreach Event">
</div>

<!-- Gallery Item 5 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Monks Learning">
</div>

<!-- Gallery Item 6 -->
<div class="gallery-item">
<img src="monk.jpg" alt="Cultural Celebration">
</div>

</div>

</div>

<footer>
<p>© 2026 Mission Bodhmay Bharat | BS4 - Bouddh Samaj Sanrakshan Sanvardhan Sangh</p>
</footer>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
